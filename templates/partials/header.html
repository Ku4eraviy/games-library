<header class="sticky top-0 z-40 glass border-b border-site-border">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">

            <!-- Логотип -->
            <a href="{% url 'game_list' %}" class="flex items-center gap-2.5 group">
                <div class="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center group-hover:bg-violet-500">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17 4H7C4.79 4 3 5.79 3 8v8c0 2.21 1.79 4 4 4h10c2.21 0 4-1.79 4-4V8c0-2.21-1.79-4-4-4z" stroke="white" stroke-width="1.5"/>
                        <path d="M9 10v4M7 12h4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="15.5" cy="11" r="1" fill="white"/>
                        <circle cx="17.5" cy="13" r="1" fill="white"/>
                    </svg>
                </div>
                <span class="text-lg font-bold tracking-tight">
                    Game<span class="text-violet-400">Lib</span>
                </span>
            </a>

            <!-- Поиск по центру (десктоп) -->
            <div class="hidden md:flex flex-1 max-w-md mx-8">
                <form method="get" action="{% url 'game_list' %}" class="w-full">
                    <div class="relative">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-500 w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <input
                            type="text"
                            name="q"
                            placeholder="Поиск игр..."
                            value="{{ request.GET.q }}"
                            class="w-full bg-site-elevated/60 border border-site-border rounded-lg pl-10 pr-4 py-2 text-sm text-neutral-100 placeholder-neutral-500 focus:border-violet-500 focus:bg-site-elevated"
                        />
                    </div>
                </form>
            </div>

            <!-- Правая часть -->
            <div class="flex items-center gap-2">
                {% if user.is_authenticated %}
                    <!-- Избранное -->
                    <a href="{% url 'favorites' %}"
                       class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm text-neutral-300 hover:text-white hover:bg-site-elevated">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                        </svg>
                        <span class="hidden sm:inline">Избранное</span>
                    </a>

                    <!-- Меню пользователя -->
                    <div class="relative group">
                        <button class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-neutral-300 hover:text-white hover:bg-site-elevated">
                            <div class="w-6 h-6 bg-violet-600 rounded-full flex items-center justify-center text-xs font-bold text-white">
                                {{ user.username|first|upper }}
                            </div>
                            <span class="hidden sm:inline">{{ user.username }}</span>
                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </button>

                        <!-- Дропдаун -->
                        <div class="absolute right-0 top-full mt-1 w-44 bg-site-surface border border-site-border rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-150">
                            {% if user.is_staff %}
                            <a href="/admin/" class="flex items-center gap-2 px-4 py-2.5 text-sm text-neutral-300 hover:text-white hover:bg-site-elevated rounded-t-xl">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                Админ-панель
                            </a>
                            {% endif %}
                            <a href="{% url 'logout' %}" class="flex items-center gap-2 px-4 py-2.5 text-sm text-red-400 hover:text-red-300 hover:bg-site-elevated rounded-b-xl">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                                Выйти
                            </a>
                        </div>
                    </div>
                {% else %}
                    <a href="{% url 'login' %}" class="px-4 py-2 text-sm text-neutral-300 hover:text-white rounded-lg hover:bg-site-elevated">
                        Войти
                    </a>
                    <a href="{% url 'register' %}" class="px-4 py-2 text-sm font-medium bg-violet-600 hover:bg-violet-500 text-white rounded-lg">
                        Регистрация
                    </a>
                {% endif %}
            </div>
        </div>

        <!-- Мобильный поиск -->
        <div class="md:hidden pb-3">
            <form method="get" action="{% url 'game_list' %}">
                <div class="relative">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-500 w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input type="text" name="q" placeholder="Поиск игр..." value="{{ request.GET.q }}"
                        class="w-full bg-site-elevated border border-site-border rounded-lg pl-10 pr-4 py-2 text-sm text-neutral-100 placeholder-neutral-500"/>
                </div>
            </form>
        </div>
    </nav>
</header>
